name: "🐛 Bug Report"
description: "Report a bug to help us improve RankerHub"
title: "[Bug]: "
labels: ["bug", "gssoc26", "NSoC'26", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Please follow the contribution guidelines and check for duplicate issues first.
  - type: textarea
    id: description
    attributes:
      label: "Bug Description"
      description: "A clear and concise description of what the bug is, steps to reproduce, and expected behavior."
      placeholder: "Describe the bug here..."
    validations:
      required: true
