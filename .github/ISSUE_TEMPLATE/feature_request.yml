name: "💡 Feature Request"
description: "Suggest a new feature or improvement for RankerHub"
title: "[Feature]: "
labels: ["enhancement", "gssoc26", "NSoC'26", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Have a great idea for RankerHub? Share it with us! Please check if the feature has already been proposed, and feel free to discuss major proposals in GitHub Discussions first.
  - type: textarea
    id: description
    attributes:
      label: "Feature Description"
      description: "A clear and concise description of the feature request or improvement you would like."
      placeholder: "Describe the feature here..."
    validations:
      required: true
